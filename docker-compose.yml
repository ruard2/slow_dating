services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: slowdating
      POSTGRES_USER: slowdating
      POSTGRES_PASSWORD: slowdating
    ports:
      - "5432:5432"
    volumes:
      - slowdating-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slowdating -d slowdating"]
      interval: 2s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  slowdating-postgres:
