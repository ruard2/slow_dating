name: Quality

on:
  pull_request:
  push:
    branches:
      - master
      - "rewrite/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks, unit tests and builds
        run: npm run check

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Browser smoke test
        run: npm run test:e2e
