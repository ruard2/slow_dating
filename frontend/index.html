// Trek n unieke kaarten uit de juiste stapel op basis van positie
function pickCards(n, pos) {
  const deck = pos >= 40 ? CARDS_HOT : CARDS_SOFT;
  const shuffled = [...deck].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(n, deck.length));
}
function randomCard(pos) {
  return pickCards(1, pos||0)[0];
}

// Kies een spare question op basis van visit count
function getSquareText(squareNum, visitCount) {
  const sq = SQUARES[squareNum];
  if (!sq || visitCount <= 1) return sq ? sq.text : '';
  // Edging, ladder, snake, mystery, gold: altijd zelfde tekst
  if (['purple','orange','snake','mystery','gold','green'].includes(sq.type)) return sq.text;
  const pool = sq.type === 'blue' ? BLUE_EXTRA : sq.type === 'red' ? RED_EXTRA : null;
  if (!pool) return sq.text;
  return pool[(visitCount - 2) % pool.length];
}

// ─── GRID ─────────────────────────────────────────────────────────────────────
function buildGrid(){
  const g=[];
  for(let r=7;r>=0;r--){const row=[];for(let c=0;c<10;c++)row.push(r%2===0?r*10+c+1:r*10+(9-c)+1);g.push(row);}
  return g;
}
const GRID=buildGrid();
function getPos(n){for(let r=0;r<8;r++)for(let c=0;c<10;c++)if(GRID[r][c]===n)return{x:(c+.5)*10,y:(r+.5)*12.5};return null;}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function loadIO(url){
  return new Promise((res,rej)=>{
    if(window.io){res(window.io);return;}
    const s=document.createElement('script');
    s.src=`${url}/socket.io/socket.io.js`;
    s.onload=()=>res(window.io); s.onerror=rej;
    document.head.appendChild(s);
  });
}

function playBeep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;
    g.gain.setValueAtTime(0.4,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.8);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.8);
  }catch(e){}
}

function heatColor(pct){
  // 0 = cool blue, 0.5 = rose, 1 = gold
  if(pct<0.5){
    const t=pct*2;
    return `linear-gradient(90deg,hsl(${220-t*40},70%,40%),hsl(${220-t*40},70%,55%))`;
  } else {
    const t=(pct-0.5)*2;
    return `linear-gradient(90deg,hsl(${180-t*145},${70+t*20}%,${40+t*10}%),hsl(${210-t*175},${80+t*10}%,${50+t*15}%))`;
  }
}

// ─── COUNTDOWN TIMER (synced) ─────────────────────────────────────────────────
function CountdownTimer({seconds,socket,autoStart}){
  const [left,setLeft]=useState(seconds);
  const [running,setRunning]=useState(!!autoStart);
  const ref=useRef(null);
  const circ=2*Math.PI*28;

  useEffect(()=>{
    if(socket){
      socket.on('timer_sync',({action,secs})=>{
        if(action==='start'){setLeft(secs||seconds);setRunning(true);}
        if(action==='stop'){setRunning(false);}
      });
      return()=>socket.off('timer_sync');
    }
  },[socket]);

  useEffect(()=>{
    if(!running)return;
    if(left<=0){playBeep();setRunning(false);return;}
    ref.current=setTimeout(()=>setLeft(l=>l-1),1000);
    return()=>clearTimeout(ref.current);
  },[running,left]);

  function start(){
    setLeft(seconds);setRunning(true);
    if(socket) socket.emit('timer_sync',{action:'start',secs:seconds});
  }
  function stop(){
    setRunning(false);
    if(socket) socket.emit('timer_sync',{action:'stop'});
  }

  const pct=left/seconds;
  const color=left>seconds*.5?'#c084fc':left>seconds*.2?'#f87171':'#ef4444';

  return(
    <div className="flex flex-col items-center gap-2 py-2">
      <div style={{position:'relative',width:64,height:64}}>
        <svg viewBox="0 0 70 70" style={{width:'100%',height:'100%'}}>
          <circle cx="35" cy="35" r="28" fill="none" stroke="rgba(255,255,255,.1)" strokeWidth="4"/>
          <circle cx="35" cy="35" r="28" fill="none" stroke={color} strokeWidth="4"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
            style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dashoffset 1s linear,stroke .5s'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:20,fontWeight:'bold',color:'white',fontVariantNumeric:'tabular-nums'}}>{left}</span>
        </div>
      </div>
      {!running
        ?<button onClick={start} style={{background:'linear-gradient(135deg,#6b21a8,#9333ea)',color:'white',border:'none',padding:'6px 18px',borderRadius:10,fontSize:12,fontWeight:600,cursor:'pointer'}}>▶ Start</button>
        :left>0
          ?<button onClick={stop} style={{background:'rgba(255,255,255,.07)',color:'#9ca3af',border:'1px solid rgba(255,255,255,.1)',padding:'5px 14px',borderRadius:10,fontSize:11,cursor:'pointer'}}>⏸ Pauzeer</button>
          :<div style={{color:'#4ade80',fontSize:12,fontWeight:600}}>⏰ Tijd is om — stop nu!</div>
      }
    </div>
  );
}

// ─── BOARD ────────────────────────────────────────────────────────────────────
// Grid offsets: tune these if tokens appear slightly off-center on squares
const GO={top:3.8,left:3.8,right:3.8,bottom:10.5};
function tp(n){
  for(let r=0;r<8;r++)for(let c=0;c<10;c++)if(GRID[r][c]===n){
    const uw=100-GO.left-GO.right,uh=100-GO.top-GO.bottom;
    const cw=uw/10,ch=uh/8;
    return{x:GO.left+c*cw+cw/2,y:GO.top+r*ch+ch/2,cw,ch};
  }return null;
}

function Board({positions,highlight}){
  const sq=highlight?SQUARES[highlight]:null;
  const sc=sq?SC[sq.type]:SC.blue;
  const hp=highlight?tp(highlight):null;
  const uw=100-GO.left-GO.right;
  const cw=uw/10;
  return(
    <div style={{position:'relative',width:'100%',userSelect:'none'}}>
      <img src="/src/assets/board.png" alt="Slangen & Ladders bord" style={{width:'100%',borderRadius:8,display:'block'}} draggable={false}/>
      {hp&&(
        <div style={{position:'absolute',left:`${hp.x-hp.cw/2}%`,top:`${hp.y-hp.ch/2}%`,width:`${hp.cw}%`,height:`${hp.ch}%`,border:`2px solid ${sc.text}`,borderRadius:4,boxShadow:`0 0 12px ${sc.text}80,inset 0 0 8px ${sc.text}30`,background:`${sc.text}15`,pointerEvents:'none'}} className="pg"/>

          <filter id="ts" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy=".5" stdDeviation=".8" floodColor="#000" floodOpacity=".8"/>
          </filter>
          <radialGradient id="tg1" cx="35%" cy="35%"><stop offset="0%" stopColor="#f472b6"/><stop offset="100%" stopColor="#9d1755"/></radialGradient>
          <radialGradient id="tg2" cx="35%" cy="35%"><stop offset="0%" stopColor="#a78bfa"/><stop offset="100%" stopColor="#5b21b6"/></radialGradient>

  );
}

    if(timeLeft<=0){setPhase('blurred');return;}
    const t=setTimeout(()=>setTimeLeft(n=>n-1),1000);

    setReacted(true);

        {/* Blurred state */}
        {blurred&&(

}

// ─── CHAT COLUMN ──────────────────────────────────────────────────────────────
function ChatColumn({messages,myName,onSend,onReaction,onReplay,socket}){
  const [text,setText]=useState('');
  const [showEmoji,setShowEmoji]=useState(false);
  const [partnerTyping,setPartnerTyping]=useState(false);
  const typingTimerRef=useRef(null);
  const isTypingRef=useRef(false);

  useEffect(()=>{
    if(!socket)return;
    socket.on('typing_indicator',()=>{
      setPartnerTyping(true);
      clearTimeout(typingTimerRef.current);
      typingTimerRef.current=setTimeout(()=>setPartnerTyping(false),2000);
    });
    return()=>socket.off('typing_indicator');
  },[socket]);

  function handleTextChange(e){
    setText(e.target.value);
    if(socket&&!isTypingRef.current){
      isTypingRef.current=true;
      socket.emit('typing_indicator');
      setTimeout(()=>{isTypingRef.current=false;},1500);
    }
  }
  const [stream,setStream]=useState(null);
  const [camOn,setCamOn]=useState(false);
  const [recording,setRecording]=useState(false);
  const [recType,setRecType]=useState(null);
  const [recSecs,setRecSecs]=useState(0);
  const vRef=useRef(null);
  const mrRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const endRef=useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[messages.length]);
  useEffect(()=>()=>{ if(stream) stream.getTracks().forEach(t=>t.stop()); clearInterval(timerRef.current); },[]);

  async function toggleCam(){
    if(camOn){
      if(stream) stream.getTracks().forEach(t=>t.stop());
      setStream(null);setCamOn(false);
    } else {
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
        setStream(s);setCamOn(true);
        requestAnimationFrame(()=>{if(vRef.current){vRef.current.srcObject=s;vRef.current.play().catch(()=>{});}});
      }catch(e){console.warn('cam:',e.message);}
    }
  }

  function takePhoto(){
    const v=vRef.current;if(!v||!camOn)return;
    const c=document.createElement('canvas');
    const scale=Math.min(1,600/Math.max(v.videoWidth||320,v.videoHeight||240));
    c.width=(v.videoWidth||320)*scale;c.height=(v.videoHeight||240)*scale;
    c.getContext('2d').drawImage(v,0,0,c.width,c.height);
    onSend({mediaType:'photo',data:c.toDataURL('image/jpeg',.75)});
  }

  function startRec(type){
    if(!stream)return;
    chunksRef.current=[];
    const tracks=type==='audio'?stream.getAudioTracks():stream.getTracks();
    const rs=new MediaStream(tracks);
    const mime=type==='audio'?'audio/webm':'video/webm';
    const mr=new MediaRecorder(rs,{mimeType:MediaRecorder.isTypeSupported(mime)?mime:''});
    mr.ondataavailable=e=>{if(e.data.size>0)chunksRef.current.push(e.data);};
    mr.onstop=()=>{
      const blob=new Blob(chunksRef.current,{type:mime});
      const reader=new FileReader();
      reader.onload=()=>onSend({mediaType:type,data:reader.result});
      reader.readAsDataURL(blob);
    };
    mrRef.current=mr;mr.start(100);
    setRecording(true);setRecType(type);setRecSecs(0);
    timerRef.current=setInterval(()=>setRecSecs(s=>s+1),1000);
  }

  function stopRec(){
    clearInterval(timerRef.current);
    if(mrRef.current&&mrRef.current.state!=='inactive') mrRef.current.stop();
    setRecording(false);setRecType(null);setRecSecs(0);
  }

  function sendText(e){
    e.preventDefault();
    if(text.trim()){onSend({mediaType:'text',text:text.trim()});setText('');setShowEmoji(false);}
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0a0a11',borderRight:'1px solid rgba(139,26,74,.2)'}}>
      {camOn&&(
        <div style={{position:'relative',flexShrink:0,background:'#000'}}>
          <video ref={vRef} muted playsInline autoPlay style={{width:'100%',aspectRatio:'4/3',objectFit:'cover',display:'block',transform:'scaleX(-1)'}}/>
          {recording&&<div style={{position:'absolute',top:4,left:4,display:'flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:20,background:'rgba(220,38,38,.85)',fontSize:10,fontWeight:'bold',color:'white'}}>
            <span style={{width:5,height:5,borderRadius:'50%',background:'white',display:'inline-block'}}/>
            {recSecs}s {recType==='audio'?'🎙️':'🎬'}
          </div>}
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-around',padding:'6px 4px',borderBottom:'1px solid rgba(139,26,74,.15)',flexShrink:0}}>
        <button onClick={toggleCam} style={{fontSize:16,padding:4,borderRadius:8,background:camOn?'rgba(139,26,74,.5)':'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:camOn?'#c45a8a':'#6b7280'}}>🎥</button>
        {camOn&&<>
          <button onClick={takePhoto} style={{fontSize:14,padding:4,borderRadius:8,background:'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:'#f5e6d3'}}>📸</button>
          {!recording
            ?<>
              <button onClick={()=>startRec('audio')} style={{fontSize:14,padding:4,borderRadius:8,background:'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:'#f5e6d3'}}>🎙️</button>
              <button onClick={()=>startRec('video')} style={{fontSize:14,padding:4,borderRadius:8,background:'rgba(255,255,255,.05)',border:'none',cursor:'pointer',color:'#f5e6d3'}}>🎬</button>
            </>
            :<button onClick={stopRec} style={{fontSize:11,padding:'3px 8px',borderRadius:8,background:'rgba(220,38,38,.6)',border:'none',cursor:'pointer',color:'white',fontWeight:'bold'}}>⏹ Stop</button>
          }
        </>}
        <button onClick={()=>setShowEmoji(s=>!s)} style={{fontSize:16,padding:4,border:'none',background:'none',cursor:'pointer',color:showEmoji?'#c45a8a':'#6b7280'}}>😍</button>
      </div>
      {showEmoji&&(
        <div style={{padding:'4px 4px',borderBottom:'1px solid rgba(139,26,74,.15)',flexShrink:0,maxHeight:68,overflowY:'auto'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
            {EMOJIS.map(em=><button key={em} onClick={()=>{onSend({mediaType:'text',text:em});setShowEmoji(false);}} style={{fontSize:16,background:'none',border:'none',cursor:'pointer',padding:1}}>{em}</button>)}
          </div>
        </div>
      )}
      <div style={{flex:1,overflowY:'auto',padding:'6px 6px',minHeight:0}}>
        {messages.length===0&&<div style={{textAlign:'center',color:'#374151',fontSize:11,marginTop:24}}><div style={{fontSize:24,marginBottom:4}}>💬</div>Chat</div>}
        {messages.map((m,i)=><ChatMessage key={i} msg={m} isMe={m.sender===myName} onReaction={r=>onReaction&&onReaction(r,m)} onReplay={(card,origMsg)=>onReplay&&onReplay(card,origMsg)}/>)}
        {partnerTyping&&<div style={{fontSize:10,color:'#c45a8a',padding:'2px 6px',fontStyle:'italic'}}>... typt 💭</div>}
        <div ref={endRef}/>
      </div>
      <form onSubmit={sendText} style={{display:'flex',gap:4,padding:6,borderTop:'1px solid rgba(139,26,74,.2)',flexShrink:0}}>
        <input value={text} onChange={handleTextChange} placeholder="Typ..." style={{flex:1,padding:'6px 8px',borderRadius:10,background:'rgba(255,255,255,.06)',border:'1px solid rgba(139,26,74,.3)',color:'white',fontSize:11,outline:'none',minWidth:0}}/>
        <button type="submit" style={{padding:'6px 8px',borderRadius:10,background:'#8b1a4a',color:'white',fontSize:11,border:'none',cursor:'pointer'}}>↑</button>
      </form>
    </div>
  );
}

// ─── GAME ─────────────────────────────────────────────────────────────────────
function Game({game:initialGame,myNum,myName,socket,onPlayAgain}){
  const [G,setG]=useState(initialGame);
  const [rolling,setRolling]=useState(false);
  const [lastMove,setLastMove]=useState(null);
  const [prevClothing,setPrevClothing]=useState([...initialGame.clothing]);
  const [eventCard,setEventCard]=useState(null);
  const [savedCard,setSavedCard]=useState(null);
  const [bonusCard,setBonusCard]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [notebookEntries,setNotebookEntries]=useState([]);
  const [showNotebook,setShowNotebook]=useState(false);
  const [reactionNotif,setReactionNotif]=useState(null);
  const [chosenOption,setChosenOption]=useState(null); // 'A'|'B'
  const [milestone,setMilestone]=useState(null);
  const milestonesHit=useRef(new Set());
  // Mystery partner-pick systeem
  const [partnerCards,setPartnerCards]=useState(null);  // 3 kaarten die IK zie om voor partner te kiezen
  const [waitingForPick,setWaitingForPick]=useState(false); // ik wacht tot partner kiest
  const [vetoUsed,setVetoUsed]=useState(false); // veto al gebruikt deze beurt

  // Mystery cards worden aangeboden via offer_mystery_cards / pick_mystery_card

  useEffect(()=>{
    socket.on('move_result',d=>{
      setRolling(false);setPrevClothing(c=>[...c]);
      setLastMove(d.result||{});setChosenOption(null);
      setVetoUsed(false);
      // Mystery vakje: actieve speler biedt 3 kaarten aan partner
      if(d.phase==='mystery' && d.playerNumber===myNum){
        const cards=pickCards(3, d.positions[myNum]);
        setWaitingForPick(true);
        socket.emit('offer_mystery_cards',{cards});
      }
      const pos=d.positions?.[myNum]||0;
      [25,50,75].forEach(m=>{
        if(pos>=m&&!milestonesHit.current.has(m)){
          milestonesHit.current.add(m);
          const msgs25={25:'Kwart van het spel 🌸 — lekker bezig!',50:'Halverwege 🔥 — het wordt heter...',75:'Bijna 🌋 — nog even!'};
          setMilestone(msgs25[m]);
          setTimeout(()=>setMilestone(null),3500);
        }
      });
      if(d.phase==='mystery') setEventCard(randomCard());
      setG(s=>({...s,positions:d.positions,clothing:d.clothing,phase:d.phase,winner:d.winner,diceValue:d.diceValue,powerSwitch:d.powerSwitch,currentTurn:d.currentTurn}));
      if(d.result?.isDouble&&d.phase!=='finished'){
        setTimeout(()=>setBonusCard(randomCard(d.positions?.[myNum]||0)),400);
      }
    });
    socket.on('turn_advanced',d=>{
      setG(s=>({...s,phase:d.phase,currentTurn:d.currentTurn,powerSwitch:d.powerSwitch,clothing:d.clothing,diceValue:null}));
      setLastMove(null);setChosenOption(null);
      setPartnerCards(null);setWaitingForPick(false);setVetoUsed(false);setEventCard(null);
      const nowActive=d.powerSwitch?d.powerSwitch.activePlayer:d.currentTurn;
      if(nowActive===myNum){ playBeep(); if(navigator.vibrate) navigator.vibrate([100,50,100]); }
    });
    // Mystery: partner kiest kaart voor actieve speler
    socket.on('offer_mystery_cards',({cards})=>setPartnerCards(cards));
    socket.on('pick_mystery_card',({card})=>{ setWaitingForPick(false); setEventCard(card); });
    socket.on('position_update',d=>setG(s=>({...s,positions:d.positions,clothing:d.clothing})));
    socket.on('chat_message',m=>setMsgs(p=>[...p,m]));
    socket.on('fantasy_entries',({entries})=>setNotebookEntries(entries||[]));
    socket.on('media_reaction',({reaction,from})=>{
      setReactionNotif(`${from} reageerde ${reaction}`);
      setTimeout(()=>setReactionNotif(null),4000);
    });
    return()=>['move_result','turn_advanced','position_update','chat_message','fantasy_entries','media_reaction','offer_mystery_cards','pick_mystery_card'].forEach(e=>socket.off(e));
  },[]);

  const {positions,clothing,currentTurn,phase,winner,powerSwitch,playerNames,diceValue}=G;
  const opNum=myNum===0?1:0;
  const opName=playerNames[opNum]||'Partner';
  const active=powerSwitch?powerSwitch.activePlayer:currentTurn;
  const isMyTurn=active===myNum;
  const activeName=playerNames[active]||'?';
  const pendingSq=phase==='action'||phase==='mystery'?positions[active]:null;
  const sq=pendingSq?SQUARES[pendingSq]:null;
  const sqC=sq?SC[sq.type]:null;
  const myPos=positions[myNum]||0;
  const opPos=positions[opNum]||0;
  const progress=myPos/80;
  const progressColor=heatColor(progress);

  function rollDice(){if(rolling)return;setRolling(true);socket.emit('roll_dice');}
  function actionDone(){setPrevClothing([...clothing]);socket.emit('action_done');}
  function skipAction(){socket.emit('skip_action');}
  function sendChat(obj){socket.emit('chat_message',obj);setMsgs(p=>[...p,{...obj,sender:myName}]);}
  function handleNotebookAppend(text){socket.emit('fantasy_append',{text});}
  function vetoSquare(){
    setVetoUsed(true);
    const cards=pickCards(3, positions[myNum]);
    setWaitingForPick(true);
    socket.emit('offer_mystery_cards',{cards});
  }
  function pickForPartner(card){
    setPartnerCards(null);
    socket.emit('pick_mystery_card',{card});
  }
  function handleReaction(r,msg){socket.emit('media_reaction',{reaction:r});}
  function handleReplay(card,origMsg){
    setMsgs(p=>[...p,{mediaType:'text',text:`🃏 Replay betaling: "${card.title}" — ${card.desc}`,sender:myName}]);
    socket.emit('chat_message',{mediaType:'text',text:`🃏 Mystery kaart betaald: "${card.title}"`});
    // Show the card as what the viewer must do
    setEventCard(card);
  }

  const ICONS={blue:'💙',red:'🔥',purple:'💜',green:'💚',orange:'🟠',snake:'🐍',gold:'🏆',mystery:'🃏',versus:'⚔️'};
  const dots={1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],4:[[25,25],[75,25],[25,75],[75,75]],5:[[25,25],[75,25],[50,50],[25,75],[75,75]],6:[[25,25],[75,25],[25,50],[75,50],[25,75],[75,75]]};
  const dv=diceValue||1;
  const dDots=dots[dv]||dots[1];

  if(winner!==null) return<WinnerScreen winnerName={playerNames[winner]} isWinner={winner===myNum} fantasyEntries={notebookEntries} onPlayAgain={onPlayAgain}/>;

  // Which text to show for choice squares
  const squareText = sq?(
    chosenOption==='A'&&sq.choiceA ? sq.choiceA :
    chosenOption==='B'&&sq.choiceB ? sq.choiceB :
    sq.text
  ):null;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'#0d0d14',maxWidth:900,margin:'0 auto'}}>

      {/* HEADER */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 12px',background:'rgba(26,10,46,.8)',borderBottom:'1px solid rgba(139,26,74,.2)',flexShrink:0,backdropFilter:'blur(12px)'}}>
        <span style={{fontFamily:'"Playfair Display",serif',color:'#d4af37',fontWeight:700,fontSize:13}}>🐍 Slangen & Ladders</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {milestone&&<span className="fi" style={{fontSize:11,color:'#d4af37',background:'rgba(212,175,55,.15)',padding:'2px 10px',borderRadius:10,border:'1px solid rgba(212,175,55,.3)'}}>{milestone}</span>}
          {!milestone&&reactionNotif&&<span className="fi" style={{fontSize:11,color:'#c45a8a',background:'rgba(139,26,74,.2)',padding:'2px 8px',borderRadius:10}}>{reactionNotif}</span>}
          {powerSwitch&&<span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'rgba(212,175,55,.15)',color:'#d4af37'}}>⚡ {powerSwitch.turnsLeft}x</span>}
          <button onClick={()=>setShowNotebook(true)} style={{fontSize:16,background:'rgba(212,175,55,.1)',border:'1px solid rgba(212,175,55,.3)',borderRadius:8,padding:'3px 8px',cursor:'pointer',color:'#d4af37'}} title="Gedeeld notitieboek">📓</button>
          {isMyTurn
            ?<span className="pg" style={{fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,background:'rgba(139,26,74,.3)',color:'#c45a8a',border:'1px solid rgba(196,90,138,.4)'}}>✨ Jij!</span>
            :<span style={{fontSize:11,color:'#6b7280'}}>{activeName}...</span>
          }
        </div>
      </div>

      {/* CLOTHING + HEAT */}
      <div style={{padding:'6px 8px',flexShrink:0}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:4}}>
          <ClothingTracker count={clothing[myNum]} prev={prevClothing[myNum]} name={`${myName} (jij)`} isMe/>
          <ClothingTracker count={clothing[opNum]} prev={prevClothing[opNum]} name={opName} isMe={false}/>
        </div>
        {/* Heat meter */}
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11}}>🧊</span>
          <div style={{flex:1,height:8,borderRadius:4,background:'rgba(255,255,255,.07)',overflow:'hidden',position:'relative'}}>
            <div style={{height:'100%',borderRadius:4,minWidth:progress>0?'8px':'0',width:`${Math.max(progress*100,progress>0?3:0)}%`,background:progressColor,transition:'all .8s ease'}}/>
          </div>
          <span style={{fontSize:11}}>🔥</span>
          <span style={{fontSize:9,color:'#6b7280',minWidth:24,textAlign:'right'}}>{Math.round(progress*100)}%</span>
        </div>
      </div>

      {/* 3 COLUMNS */}
      <div style={{display:'flex',flex:1,minHeight:0,gap:2,padding:'0 4px 4px'}}>

        {/* LEFT: Chat */}
        <div style={{width:130,flexShrink:0,minHeight:0}}>
          <ChatColumn messages={msgs} myName={myName} onSend={sendChat} onReaction={handleReaction} onReplay={handleReplay} socket={socket}/>
        </div>

        {/* CENTER: Board */}

              {lastMove.ladder&&`🪜 ${lastMove.ladder.from}→${lastMove.ladder.to} kleding uit!`}

            <div className={rolling?'ds':''} style={{position:'relative',width:40,height:40,borderRadius:8,background:'linear-gradient(135deg,#1a0a2e,#2d0a1f)',border:'2px solid #8b1a4a'}}>

          )}
          {/* Mystery vakje: kaart gekozen, speler voert uit */}
          {phase==='mystery'&&eventCard&&(
            <div className="su" style={{borderRadius:12,overflow:'hidden',background:'linear-gradient(135deg,#150a2a,#1a0a2e)',border:'1px solid #6b21a8',boxShadow:'0 0 16px rgba(107,33,168,.4)',flexShrink:0}}>

                {!savedCard&&<button onClick={()=>setSavedCard(eventCard)} style={{background:'rgba(212,175,55,.15)',color:'#d4af37',border:'1px solid rgba(212,175,55,.3)',padding:'2px 7px',borderRadius:6,fontSize:9,cursor:'pointer'}}>🔖</button>}
              </div>

                <div style={{fontSize:32,textAlign:'center',marginBottom:6}}>{eventCard.emoji}</div>
                <div style={{fontFamily:'"Playfair Display",serif',fontSize:13,fontWeight:700,color:'white',textAlign:'center',marginBottom:6}}>{eventCard.title}</div>

                  <button onClick={()=>{setEventCard(null);actionDone();}} style={{width:'100%',padding:'8px',borderRadius:8,background:'linear-gradient(135deg,#166534,#4ade8050)',color:'white',fontWeight:600,fontSize:11,border:'1px solid #4ade8040',cursor:'pointer'}}>
                    ✓ {activeName} is klaar
                  </button>
                </div>
              }
            </div>
          )}

          {/* Saved card */}
          {savedCard&&phase!=='mystery'&&(
            <button onClick={()=>{setEventCard(savedCard);setSavedCard(null);}} style={{padding:'6px 8px',borderRadius:10,fontSize:11,fontWeight:500,background:'rgba(212,175,55,.1)',border:'1px solid rgba(212,175,55,.3)',color:'#d4af37',cursor:'pointer',flexShrink:0}}>

          {/* Mystery info — geen losse knop meer, kaarten lopen via vakjes en veto */}
          <div style={{padding:'4px 6px',borderRadius:8,fontSize:9,color:'#475569',textAlign:'center',border:'1px solid rgba(71,85,105,.2)'}}>

          </div>
        </div>
      </div>

      {/* Overlays */}
      {eventCard&&phase!=='mystery'&&(
        <MysteryOverlay card={eventCard} isMe={true} onDone={()=>setEventCard(null)}
          onSave={()=>{setSavedCard(eventCard);setEventCard(null);}} saved={!!savedCard}/>
      )}
      {bonusCard&&(
        <MysteryOverlay card={bonusCard} title="🎲🎲 Dubbel! Bonus Kaart" isMe={true} onDone={()=>setBonusCard(null)}/>
      )}
      {showNotebook&&<FantasyNotebook entries={notebookEntries} myNum={myNum} onAppend={handleNotebookAppend} onClose={()=>setShowNotebook(false)}/>}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('lobby'); // lobby|waiting|setup|game
  const [myNum,setMyNum]=useState(null);
  const [myName,setMyName]=useState('');
  const [roomId,setRoomId]=useState(null);
  const [game,setGame]=useState(null);
  const [error,setError]=useState('');
  const [socket,setSocket]=useState(null);
  const [loading,setLoading]=useState(false);
  const [setupData,setSetupData]=useState({});

  async function getSocket(){
    if(socket)return socket;
    setLoading(true);
    try{
      const io=await loadIO(window.BACKEND_URL);
      const s=io(window.BACKEND_URL,{autoConnect:true,reconnection:true});
      s.on('connect_error',()=>setError('Kan geen verbinding maken. Is de backend actief?'));
      s.on('room_created',({roomId,playerNumber,game})=>{setRoomId(roomId);setMyNum(playerNumber);setGame(game);setScreen('waiting');});
      s.on('room_joined',({roomId,playerNumber,game})=>{setRoomId(roomId);setMyNum(playerNumber);setGame(game);});
      s.on('enter_setup',({game})=>{setGame(game);setScreen('setup');});
      s.on('setup_update',({setupData})=>setSetupData(setupData));
      s.on('game_start',({game})=>{setGame(game);setScreen('game');});
      s.on('player_disconnected',({message})=>setError(message));
      s.on('error',({message})=>setError(message));
      setSocket(s);setLoading(false);return s;
    }catch(e){setError('Kon socket.io niet laden.');setLoading(false);return null;}
  }

  async function handleCreate(name){setMyName(name);setError('');const s=await getSocket();if(s)s.emit('create_room',{playerName:name});}
  async function handleJoin(name,code){setMyName(name);setError('');const s=await getSocket();if(s)s.emit('join_room',{roomId:code,playerName:name});}
  function handleSetup(intensity,word){socket&&socket.emit('player_setup',{intensity,word});}

  if(loading)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0d0d14'}}><div style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:12}}>⚙️</div><p style={{color:'#6b7280'}}>Verbinding maken...</p></div></div>;
  if(screen==='lobby')return<Lobby onCreate={handleCreate} onJoin={handleJoin} error={error}/>;
  if(screen==='waiting')return<WaitingRoom roomId={roomId} playerName={myName}/>;
  if(screen==='setup'&&game)return<PreGameSetup myName={myName} myNumber={myNum} setupData={setupData} onSubmit={handleSetup}/>;
  if(screen==='game'&&game&&socket)return<Game game={game} myNum={myNum} myName={myName} socket={socket} onPlayAgain={()=>window.location.reload()}/>;
  return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0d0d14'}}><div style={{textAlign:'center'}}><div style={{fontSize:40}}>⏳</div><p style={{color:'#6b7280',marginTop:12}}>Wacht op partner...</p>{error&&<p style={{color:'#f87171',fontSize:12,marginTop:8}}>{error}</p>}</div></div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
